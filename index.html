<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <title>Hometown Homepage</title>
</head>

<body>
    <header>
        <h1>Visit Dressrosa</h1>
        <strong>Enjoy culture and sports in this vibrant city, also kind of a country.</strong>
    </header>

    <main>
        <section class="visit-places">
            <h2>Top three activities to do at Dressrosa</h2>
            <article>
                <figure>
                    <img class="visit-places-img" src="./images/corrida_colosseum.webp" alt="The Corrida Colosseum" />
                    <figcaption>
                        <strong>Attend a show or participate</strong>
                        <p>The Corrida Colosseum is a great place to spend your day out.</p>
                    </figcaption>
                </figure>
                <figure>
                    <img class="visit-places-img" src="./images/flower-hill-field.webp" alt="The Flower Hill Field" />
                    <figcaption>
                        <strong>Go for a piknic in the local flower field</strong>
                        <p>The Flower Hill Field is perfect for piknic, getting some tan, or just chilling out.</p>
                    </figcaption>
                </figure>
                <figure>
                    <img class="visit-places-img" src="./images/toys.webp" alt="The Famous Dressrosa Toys" />
                    <figcaption>
                        <strong>Play at the city.</strong>
                        <p>Play and interact with Dressrosa's famous <i>Toys</i></p>
                    </figcaption>
                </figure>
            </article>
        </section>
        <section class="tour-guide">
            <img class="guide-img" src="./images/doflamingo.webp" alt="Donquixote Doflamingo" />
            <article>
                <h2>Your guide</h2>
                <i>"I have lived at Dressrosa for over 10 years, so I can show you all of it's best parts and hidden
                    secrets."</i>
                <strong>Donquixote Doflamingo</strong>
            </article>
        </section>
    </main>
</body>

</html>
